name: immo_zone
description: "ImmoZone - Plateforme immobilière Vente, Achat & Location"
publish_to: 'none'
version: 1.2.59+75

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: 6.1.5+1

  # Navigation
  go_router: 14.8.1

  # UI Components
  cupertino_icons: 1.0.8
  flutter_svg: 2.0.16
  cached_network_image: 3.4.1
  shimmer: 3.0.0
  carousel_slider: 5.0.0
  photo_view: 0.15.0

  # Firebase
  firebase_core: 3.6.0
  firebase_auth: 5.3.1
  cloud_firestore: 5.4.3
  firebase_app_check: 0.3.1+4

  # Local Storage (gardé pour favoris/prefs locales)
  shared_preferences: 2.5.3

  # HTTP & Network
  http: 1.5.0

  # Utils
  intl: 0.20.2
  image_picker: 1.1.2
  url_launcher: 6.3.1
  font_awesome_flutter: 10.8.0
  share_plus: ^12.0.2
  path_provider: 2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

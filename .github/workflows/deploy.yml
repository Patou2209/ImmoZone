name: Build and Deploy ImmoZone Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    name: Flutter Build + Firebase Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Flutter SDK
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # 3. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4. Build Flutter web (no Service Worker)
      - name: Build Flutter Web
        run: flutter build web --release --pwa-strategy=none --dart-define=flutter.inspector.structuredErrors=false

      # 5. Remove Service Worker if it exists
      - name: Remove Service Worker
        run: rm -f build/web/flutter_service_worker.js

      # 6. Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 7. Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only hosting --project immozone-d9a68 --non-interactive
          rm /tmp/sa.json

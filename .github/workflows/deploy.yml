name: Build & Deploy ImmoZone Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Flutter Build + Firebase Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Récupérer le code ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Installer Flutter avec cache ──────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # ── 3. Installer les dépendances ─────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 4. Build web release (sans Service Worker) ───────────────────────
      - name: Build Flutter Web
        run: |
          flutter build web --release \
            --pwa-strategy=none \
            --dart-define=flutter.inspector.structuredErrors=false

      # ── 5. Supprimer le Service Worker ───────────────────────────────────
      - name: Remove Service Worker
        run: rm -f build/web/flutter_service_worker.js

      # ── 6. Installer Firebase CLI ────────────────────────────────────────
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # ── 7. Déployer sur Firebase Hosting via Service Account ─────────────
      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only hosting \
            --project immozone-d9a68 \
            --non-interactive
          rm /tmp/sa.json

<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="ImmoZone — Immobilier en République Démocratique du Congo. Achetez, vendez ou louez des propriétés facilement.">
  <meta name="theme-color" content="#E65100">

  <!-- Open Graph -->
  <meta property="og:title" content="ImmoZone — Immobilier RDC">
  <meta property="og:description" content="Trouvez votre bien immobilier en RDC. Maisons, appartements, terrains à vendre ou en location.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ImmoZone">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ImmoZone — Immobilier RDC</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Splash screen pendant le chargement Flutter */
    body {
      margin: 0;
      padding: 0;
      background-color: #E65100;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }
    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    #splash img {
      width: 96px;
      height: 96px;
      border-radius: 22px;
    }
    #splash-title {
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    #splash-sub {
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      margin-top: -12px;
    }
    #splash-loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Splash affiché pendant le chargement de Flutter -->
  <div id="splash">
    <img src="icons/Icon-192.png" alt="ImmoZone" onerror="this.style.display='none'">
    <div id="splash-title">ImmoZone</div>
    <div id="splash-sub">Immobilier RDC</div>
    <div id="splash-loader"></div>
  </div>

  <script>
    // Cacher le splash dès que Flutter est prêt
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.style.transition = 'opacity 0.4s ease';
        splash.style.opacity = '0';
        setTimeout(function() { splash.remove(); }, 400);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- ── Meta Open Graph (preview WhatsApp / Facebook / Twitter) ─────────── -->
  <meta property="og:site_name" content="ImmoZone">
  <meta property="og:type" content="website">
  <meta property="og:title" content="ImmoZone — Immobilier en RDC & Congo-Brazzaville">
  <meta property="og:description" content="Achetez, vendez ou louez un bien immobilier en quelques clics sur ImmoZone.">
  <meta property="og:image" content="https://www.immozone.pro/icons/Icon-512.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:url" content="https://www.immozone.pro">

  <!-- ── Twitter Card ──────────────────────────────────────────────────────── -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="ImmoZone — Immobilier en RDC & Congo-Brazzaville">
  <meta name="twitter:description" content="Achetez, vendez ou louez un bien immobilier en quelques clics sur ImmoZone.">
  <meta name="twitter:image" content="https://www.immozone.pro/icons/Icon-512.png">

  <!-- ── Description générale ─────────────────────────────────────────────── -->
  <meta name="description" content="ImmoZone — La plateforme immobilière de référence en RDC et Congo-Brazzaville.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ImmoZone">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ImmoZone — Immobilier RDC & Congo</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // ── Injection dynamique des meta OG pour les deep-links /property/:id ──
    // WhatsApp scrape le HTML statique AVANT que Flutter s'exécute.
    // Ce script lit le path et met à jour les meta og: immédiatement,
    // sans attendre le rendu Flutter.
    (function () {
      var path = window.location.pathname;
      var match = path.match(/^\/property\/([^/]+)$/);
      if (match) {
        var id = match[1];
        // Référence courte IZ + 4 derniers chars
        var ref = 'IZ' + id.slice(-4).toUpperCase();
        var url = 'https://www.immozone.pro/property/' + id;
        var title = 'Annonce ' + ref + ' — ImmoZone';
        var desc = 'Découvrez cette annonce immobilière sur ImmoZone. Cliquez pour voir tous les détails, photos et contacter l\'annonceur.';
        var img = 'https://www.immozone.pro/icons/Icon-512.png';

        function setMeta(attr, key, val) {
          var el = document.querySelector('meta[' + attr + '="' + key + '"]');
          if (el) el.setAttribute('content', val);
        }

        // og:
        setMeta('property', 'og:title', title);
        setMeta('property', 'og:description', desc);
        setMeta('property', 'og:url', url);
        setMeta('property', 'og:image', img);
        // twitter:
        setMeta('name', 'twitter:title', title);
        setMeta('name', 'twitter:description', desc);
        setMeta('name', 'twitter:image', img);
        // title
        document.title = title;
        // description
        setMeta('name', 'description', desc);
      }
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
